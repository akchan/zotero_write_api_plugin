addon:
  id: zotero-write-api@akchan.acts
  slug: zotero-write-api
  name: Zotero Write API
  author: akchan
  description: Minimal Zotero write API used by the zotero_mcp_server_write MCP
    server. Exposes /attach, /write (import_by_identifier, attach_note,
    import_pdf), and /version endpoints on Zotero's local HTTP server.
repo:
  owner: akchan
  name: zotero_write_api_plugin
  branch: main
zotero:
  strict_min_version: '7.0'
  strict_max_version: '*'
  tested_version: 8.0.1
endpoints:
  attach: /attach
  write: /write
  version: /version
fulltext_attach:
  allowed_dirs:
  - /tmp
  - /var/tmp
